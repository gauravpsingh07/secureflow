name: Secret scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Gate — fail if secrets are committed to source
        run: pnpm scan app lib scripts

      - name: Demo — confirm the scanner catches a planted secret
        run: |
          # The fake key is assembled at runtime so it isn't a contiguous literal
          # in this file (which would trip upstream secret scanners), yet the
          # written file still contains a realistic key for our scanner to catch.
          mkdir -p /tmp/scan-demo
          STRIPE_PREFIX="sk_live_"
          printf 'aws_access_key_id = AKIAIOSFODNN7EXAMPLE\nstripe = %s%s\n' "$STRIPE_PREFIX" 'A1b2C3d4E5f6G7h8I9j0KLmn' > /tmp/scan-demo/leak.env
          if pnpm scan /tmp/scan-demo; then
            echo "::error::Scanner failed to flag the planted secret"
            exit 1
          else
            echo "Scanner correctly flagged the planted secret."
          fi
