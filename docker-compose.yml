services:
  db:
    image: postgres:16
    container_name: secureflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secureflow
    ports:
      - '5432:5432'
    volumes:
      - secureflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d secureflow']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  secureflow-pgdata:
